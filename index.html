<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ted 2 - Party Play</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #e50914; --bg: #141414; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        .hero {
            position: relative; height: 100vh; width: 100%;
            display: flex; align-items: center; padding: 0 4%;
            background: linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.7) 100%),
                        linear-gradient(to top, var(--bg) 0%, transparent 30%),
                        url('https://media.themoviedb.org/t/p/w300_and_h450_face/bO59Vn36fQauTDQpKNlHxvcK9Nw.jpg') center 20%/cover no-repeat;
        }
        .content { max-width: 650px; z-index: 10; animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .brand { color: var(--brand); font-weight: 900; letter-spacing: 3px; font-size: clamp(0.8rem, 2vw, 1rem); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        h1 { font-size: clamp(2.5rem, 7vw, 4.5rem); font-weight: 900; line-height: 1.1; margin-bottom: 15px; text-transform: uppercase; }
        .meta { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 20px; font-weight: 700; font-size: clamp(0.9rem, 2vw, 1.1rem); }
        .match { color: #46d369; }
        .age { border: 1px solid #808080; padding: 0 6px; font-size: 0.8rem; }
        .desc { font-size: clamp(1rem, 2.5vw, 1.2rem); line-height: 1.5; color: #e5e5e5; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 35px; border-radius: 4px; font-size: clamp(1rem, 2vw, 1.2rem); font-weight: 700; cursor: pointer; border: none; transition: 0.2s; }
        .btn-play { background: #fff; color: #000; }
        .btn-play:hover { background: rgba(255,255,255,0.85); transform: scale(1.05); }
        .btn-info { background: rgba(109,109,110,0.7); color: #fff; }
        #player-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #player-overlay.active { display: flex; }
        .player-nav { padding: 15px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); display: flex; align-items: center; gap: 15px; z-index: 10; }
        .close-btn { background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; }
        .server-bar { display: flex; gap: 10px; padding: 0 20px 15px; flex-wrap: wrap; }
        .srv-btn { background: #333; border: none; color: #aaa; padding: 8px 18px; border-radius: 4px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .srv-btn:hover { background: #444; color: #fff; }
        .srv-btn.active { background: var(--brand); color: #fff; }
        .player-frame { flex: 1; width: 100%; border: none; }
        @media (max-width: 600px) {
            .hero { align-items: flex-end; padding-bottom: 10vh; background-position: 65% center; }
            .content { text-align: center; }
            .meta, .actions { justify-content: center; }
            .btn { width: 100%; padding: 16px; }
        }
    </style>
</head>
<body>
    <main class="hero">
        <div class="content">
            <div class="brand">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
                PARTY PLAY
            </div>
            <h1>Ted 2</h1>
            <div class="meta">
                <span class="match">99% para ti</span>
                <span>2015</span>
                <span class="age">16+</span>
                <span>HD</span>
            </div>
            <p class="desc">Se trata de una secuela de la exitosa comedia escrita y dirigida por el cómico Seth MacFarlane. Recién casados Ted y Tami-Lynn deciden tener un bebé. John se ofrece en donar su esperma para que su mej...</p>
            <div class="actions">
                <button class="btn btn-play" onclick="openPlayer()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4l15 8-15 8z"/></svg>
                    Reproducir
                </button>
                <button class="btn btn-info">Más información</button>
            </div>
        </div>
    </main>
    <div id="player-overlay">
        <div class="player-nav">
            <button class="close-btn" onclick="closePlayer()">✕</button>
            <span style="font-weight:bold">Ted 2</span>
        </div>
        <div class="server-bar"><button class="srv-btn active" onclick="switchSrv(0)">Servidor 1</button></div>
        <iframe class="player-frame" id="main-frame" src="" allowfullscreen></iframe>
    </div>
    <script>
        const srcs = ["https://vimeos.net/embed-jlim2kn823lq.html"];
        const overlay = document.getElementById('player-overlay');
        const frame = document.getElementById('main-frame');
        let current = 0;
        function openPlayer() { overlay.classList.add('active'); frame.src = srcs[current]; document.body.style.overflow = 'hidden'; }
        function closePlayer() { overlay.classList.remove('active'); frame.src = ''; document.body.style.overflow = 'auto'; }
        function switchSrv(i) {
            current = i;
            frame.src = srcs[i];
            document.querySelectorAll('.srv-btn').forEach((b,idx) => b.classList.toggle('active', idx===i));
        }
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
